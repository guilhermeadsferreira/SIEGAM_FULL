<mat-card class="profile-card">
  <div class="brand">
    <img src="../../../../assets/cempa_horizontal.png" alt="CEMPA-Cerrado" class="brand-logo" />
  </div>

  <mat-card-content>
    <p class="instructions">
      Para sua segurança, confirme suas credenciais para acessar as configurações ou descadastrar-se.
    </p>

    <form [formGroup]="form">
      <mat-form-field appearance="fill" class="full-width">
        <mat-label>Usuário (E-mail)</mat-label>
        <input matInput formControlName="username" />
        <mat-error *ngIf="form.get('username')?.hasError('required')">
          O usuário é obrigatório.
        </mat-error>
      </mat-form-field>

      <mat-form-field appearance="fill" class="full-width">
        <mat-label>Senha</mat-label>
        <input matInput type="password" formControlName="password" />
        <mat-error *ngIf="form.get('password')?.hasError('required')">
          A senha é obrigatória.
        </mat-error>
      </mat-form-field>

      <div class="actions-column">
        <button 
          mat-raised-button 
          color="primary" 
          type="button" 
          (click)="onEditPreferences()"
          [disabled]="form.invalid || isLoading">
          {{ isLoading ? 'Processando...' : 'Editar preferências' }}
        </button>

        <button 
          mat-stroked-button 
          color="warn" 
          type="button" 
          (click)="onUnsubscribe()"
          [disabled]="form.invalid || isLoading">
          Descadastrar do sistema
        </button>
      </div>
    </form>
  </mat-card-content>
</mat-card>
