# ==============================================================================
# CONFIGURA��ES GERAIS / DESENVOLVIMENTO
# ==============================================================================
# --- HTTP & Dev Services ---
%dev.quarkus.http.port=8002
%dev.quarkus.devservices.enabled=true

# --- Banco de Dados (Dev Services / Container Autom�tico) ---
%dev.quarkus.datasource.devservices.image-name=postgres:16
%dev.quarkus.datasource.devservices.db-name=sigedam
%dev.quarkus.datasource.db-kind=postgresql
%dev.quarkus.datasource.username=postgres_user
%dev.quarkus.datasource.password=postgres_password

# --- Hibernate (Destrutivo - APENAS DEV) ---
%dev.quarkus.hibernate-orm.database.generation=update
%dev.quarkus.hibernate-orm.log.sql=true
%dev.quarkus.log.category."org.hibernate.SQL".level=DEBUG

# --- Seguran�a (JWT) ---
%dev.mp.jwt.verify.publickey.location=classpath:public.pem
%dev.smallrye.jwt.sign.key.location=classpath:privateKey-pkcs8.pem
%dev.mp.jwt.verify.issuer=org.ufg.api
%dev.quarkus.native.resources.includes=public.pem

# --- CORS (Permissivo para Angular Local) ---
%dev.quarkus.http.cors.enabled=true
%dev.quarkus.http.cors.origins=http://localhost:4200,http://localhost:9090
%dev.quarkus.http.cors.access-control-allow-credentials=true
%dev.quarkus.http.cors.headers=accept, authorization, content-type, x-requested-with
%dev.quarkus.http.cors.methods=GET, PUT, POST, DELETE, OPTIONS, PATCH

# --- Logs Detalhados (Debug) ---
%dev.quarkus.log.category."com.fasterxml.jackson".level=DEBUG
%dev.quarkus.log.category."org.hibernate.validator".level=DEBUG
%dev.quarkus.log.category."org.jboss.resteasy".level=DEBUG

# ==============================================================================
# CONFIGURA��ES GERAIS / PRODU��O
