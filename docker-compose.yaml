services:
  modulo_envios:
    container_name: modulo_envios
    build: ./backend/modulo_envios
    ports:
      - "8000:8000"
      - "5678:5678"
    volumes:
      - ./backend/modulo_envios:/app
    command: python -m debugpy --listen 0.0.0.0:5678 -m uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload
    env_file:
      - ./backend/modulo_envios/.env
    environment:
      TZ: America/Sao_Paulo
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - sigedam-net

  modulo_usuarios:
    build: ./backend/modulo_usuarios
    container_name: modulo_usuarios
    ports:
      - "8002:8002"
    environment:
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://db:5432/sigedam
      TZ: America/Sao_Paulo
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8002 && echo -e 'GET /q/health HTTP/1.0\\r\\nHost: localhost\\r\\n\\r\\n' >&3 && timeout 1 cat <&3 | grep -q 'UP'"]
      interval: 5s
      timeout: 10s
      retries: 60
      start_period: 60s
    networks:
      - sigedam-net

  modulo_envios_worker:
    container_name: modulo_envios_worker
    build: ./backend/modulo_envios
    volumes:
      - ./backend/modulo_envios:/app
    command: python -u -m src.consumers.notification_consumer
    env_file:
      - ./backend/modulo_envios/.env
    environment:
      TZ: America/Sao_Paulo
    depends_on:
      redis:
        condition: service_healthy
      modulo_usuarios:
        condition: service_healthy
    networks:
      - sigedam-net

  db:
    image: postgres:16
    container_name: sigedam-db
    environment:
      POSTGRES_DB: sigedam
      POSTGRES_USER: cempa
      POSTGRES_PASSWORD: j5fwuyqnoe
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cempa -d sigedam"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sigedam-net

  redis:
    image: redis:7-alpine
    container_name: sigedam-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sigedam-net

volumes:
  postgres_data:
  redis_data:

networks:
  sigedam-net:
    driver: bridge
